name: Build libtorrent-rasterbar

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [ "2.0.11" ]  # Version de libtorrent-rasterbar à compiler
    env:
      ARCHITECTURE: "amd64"
    steps:
      - name: Update packages
        run: sudo apt-get update --fix-missing

      - uses: tecolicom/actions-use-apt-tools@v1
        with:
          tools: build-essential libssl-dev python3-dev python3-setuptools python3-pip cmake ninja-build git curl wget zip unzip
          cache: false

      - name: Check if a release exists
        id: check_release
        run: |
          set +e
          gh release view --latest > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "release_exists=false" >> $GITHUB_OUTPUT
          else
            echo "release_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine next build number
        id: determine_build
        if: ${{ steps.check_release.outputs.release_exists == 'true' }}
        run: |
          ASSETS=$(gh release view --latest --json assets --jq '.assets[].name')
          echo "Existing assets: $ASSETS"
          build_numbers=$(echo "$ASSETS" | grep -oP 'libtorrent-rasterbar_${{ matrix.version }}-1build\K([0-9]+)(?=_amd64\.deb)')
          if [ -z "$build_numbers" ]; then
            next_build=1
          else
            max_build=$(echo "$build_numbers" | sort -n | tail -n1)
            next_build=$((max_build + 1))
          fi
          echo "next_build=$next_build" >> $GITHUB_OUTPUT

      - name: Check if asset for next build already exists
        id: check_asset
        if: ${{ steps.check_release.outputs.release_exists == 'true' }}
        run: |
          next_build=${{ steps.determine_build.outputs.next_build }}
          ASSET_NAME="libtorrent-rasterbar_${{ matrix.version }}-1build${next_build}_${{ env.ARCHITECTURE }}.deb"
          echo "Looking for asset: $ASSET_NAME"
          ASSETS=$(gh release view --latest --json assets --jq '.assets[].name')
          if echo "$ASSETS" | grep -q "$ASSET_NAME"; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build.sh
        id: build_script
        if: >
          ${{ steps.check_release.outputs.release_exists == 'false' ||
            steps.check_asset.outputs.skip_build == 'false' }}
        run: |
          chmod +x build.sh
          ./build.sh "${{ matrix.version }}"
          
          # Collect DEB files
          deb_files=()
          while IFS= read -r file; do
            deb_files+=("$file")
          done < <(find . -name "*.deb" -print)
          
          echo "Found DEB files: ${deb_files[*]}"
          
          # Process libtorrent-rasterbar package
          lib_deb=$(find . -name "libtorrent-rasterbar_*.deb" -print -quit)
          echo "libtorrent-rasterbar package: $lib_deb"
          
          if [ -z "${{ steps.determine_build.outputs.next_build }}" ]; then
            next_build=1
          else
            next_build="${{ steps.determine_build.outputs.next_build }}"
          fi
          build_number="1build${next_build}"
          
          # Rename libtorrent-rasterbar package
          lib_deb_basename="$(basename "$lib_deb")"
          lib_package_name=$(echo "$lib_deb_basename" | sed -E 's/^(.*)-1build[0-9]+(.*)\.deb$/\1/')
          lib_ending=$(echo "$lib_deb_basename" | sed -E 's/^(.*)-1build[0-9]+(.*)\.deb$/\2/')
          new_lib_deb="${lib_package_name}-${build_number}${lib_ending}.deb"
          echo "New libtorrent-rasterbar package name: $new_lib_deb"
          if [ "$lib_deb" != "./$new_lib_deb" ]; then
            mv "$lib_deb" "./$new_lib_deb"
          fi
          
          # Process python3-libtorrent-rasterbar package
          py_deb=$(find . -name "python3-libtorrent-rasterbar_*.deb" -print -quit)
          echo "python3-libtorrent-rasterbar package: $py_deb"
          
          # Rename python3-libtorrent-rasterbar package
          py_deb_basename="$(basename "$py_deb")"
          py_package_name=$(echo "$py_deb_basename" | sed -E 's/^(.*)-1build[0-9]+(.*)\.deb$/\1/')
          py_ending=$(echo "$py_deb_basename" | sed -E 's/^(.*)-1build[0-9]+(.*)\.deb$/\2/')
          new_py_deb="${py_package_name}-${build_number}${py_ending}.deb"
          echo "New python3-libtorrent-rasterbar package name: $new_py_deb"
          if [ "$py_deb" != "./$new_py_deb" ]; then
            mv "$py_deb" "./$new_py_deb"
          fi
          
          echo "deb_files=$new_lib_deb $new_py_deb" >> $GITHUB_OUTPUT

      - name: Post-process artifacts
        if: ${{ steps.build_script.outputs.deb_files != '' && (steps.check_release.outputs.release_exists == 'false' || steps.check_asset.outputs.skip_build == 'false') }}
        run: |
          if [ -z "${{ steps.determine_build.outputs.next_build }}" ]; then
            next_build=1
          else
            next_build="${{ steps.determine_build.outputs.next_build }}"
          fi
          build="1build${next_build}"
          
          # Process libtorrent-rasterbar package
          lib_deb=$(find . -name "libtorrent-rasterbar_*.deb" -print -quit)
          lib_checksum=$(sha256sum "$lib_deb" | awk '{print $1}')
          CURRENT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          lib_package_id=$(basename "$lib_deb" .deb)
          lib_json_file="${lib_package_id}.json"
          
          jq -n \
            --arg package_id "$lib_package_id" \
            --arg version "${{ matrix.version }}" \
            --arg build "$build" \
            --arg checksum_sha256 "$lib_checksum" \
            --arg build_date "$CURRENT_DATE" \
            --arg category "libtorrent" \
            --arg tag "rasterbar" \
            --argjson distribution '["bookworm"]' \
            '{
              package_id: $package_id,
              version: $version,
              build: $build,
              checksum_sha256: $checksum_sha256,
              build_date: $build_date,
              category: $category,
              tag: $tag,
              distribution: $distribution
            }' > "$lib_json_file"
          
          # Process python3-libtorrent-rasterbar package
          py_deb=$(find . -name "python3-libtorrent-rasterbar_*.deb" -print -quit)
          py_checksum=$(sha256sum "$py_deb" | awk '{print $1}')
          py_package_id=$(basename "$py_deb" .deb)
          py_json_file="${py_package_id}.json"
          
          jq -n \
            --arg package_id "$py_package_id" \
            --arg version "${{ matrix.version }}" \
            --arg build "$build" \
            --arg checksum_sha256 "$py_checksum" \
            --arg build_date "$CURRENT_DATE" \
            --arg category "libtorrent" \
            --arg tag "python" \
            --argjson distribution '["bookworm"]' \
            '{
              package_id: $package_id,
              version: $version,
              build: $build,
              checksum_sha256: $checksum_sha256,
              build_date: $build_date,
              category: $category,
              tag: $tag,
              distribution: $distribution
            }' > "$py_json_file"
          
          ls -l *.json

      - name: Upload artifacts
        if: >
          ${{ steps.check_release.outputs.release_exists == 'false' ||
            steps.check_asset.outputs.skip_build == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-${{ matrix.version }}
          path: |
            *.deb
            *.json
          retention-days: 7
  
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Create Git Tag
        id: prepare_release
        run: |
          echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.prepare_release.outputs.today }}
          tag_name: v${{ steps.prepare_release.outputs.today }}
          generate_release_notes: true
          files: |
            downloaded_artifacts/**/*.deb
            downloaded_artifacts/**/*.json 
