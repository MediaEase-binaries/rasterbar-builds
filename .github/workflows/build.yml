name: Build libtorrent-rasterbar

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Libtorrent version to build'
        required: false
        default: ''

jobs:
  check-versions:
    name: Check versions to build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    
    steps:
      - name: Set versions list
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSIONS_JSON="[\"${{ github.event.inputs.version }}\"]"
          else
            VERSIONS_JSON='["2.0.11", "1.2.20", "2.0.10", "2.0.9", "1.2.19", "2.0.8"]'
          fi
          FILTERED_VERSIONS=()
          VERSIONS=$(echo $VERSIONS_JSON | jq -r '.[]')
          for VERSION in $VERSIONS; do
            RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")
            if [ "$RELEASE_EXISTS" != "200" ]; then
              echo "Version $VERSION needs to be built, no release found"
              FILTERED_VERSIONS+=("\"$VERSION\"")
            else
              echo "Version $VERSION already has a release, skipping"
            fi
          done
          if [ ${#FILTERED_VERSIONS[@]} -eq 0 ]; then
            echo "No versions to build"
            echo "matrix={\"libtorrent-version\":[]}" >> $GITHUB_OUTPUT
          else
            MATRIX_JSON="{\"libtorrent-version\":[$(IFS=,; echo "${FILTERED_VERSIONS[*]}")]}"
            echo "Versions to build: $MATRIX_JSON"
            echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build libtorrent-rasterbar
    needs: check-versions
    runs-on: ubuntu-latest
    if: ${{ fromJson(needs.check-versions.outputs.matrix).libtorrent-version[0] != null }}
    
    strategy:
      matrix: ${{ fromJson(needs.check-versions.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev cmake ninja-build python3-dev python3-setuptools python3-pip libboost-python-dev pkg-config jq curl

      - name: Build libtorrent-rasterbar library
        run: |
          VERSION="${{ matrix.libtorrent-version }}"
          echo "Building libtorrent-rasterbar version $VERSION"
          chmod +x ./build-lib.sh
          ./build-lib.sh $VERSION

      - name: Build Python bindings
        run: |
          VERSION="${{ matrix.libtorrent-version }}"
          echo "Building Python bindings for libtorrent-rasterbar version $VERSION"
          chmod +x ./build-bindings.sh
          ./build-bindings.sh $VERSION

      - name: Create Debian packages
        run: |
          VERSION="${{ matrix.libtorrent-version }}"
          echo "Creating Debian packages for libtorrent-rasterbar version $VERSION"
          chmod +x ./build-packages.sh
          ./build-packages.sh $VERSION

      - name: List generated packages
        run: |
          ls -la *.deb

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libtorrent-packages-${{ matrix.libtorrent-version }}
          path: |
            *.deb
          retention-days: 7

  release:
    name: Create Releases
    needs: [check-versions, build]
    runs-on: ubuntu-latest
    if: ${{ fromJson(needs.check-versions.outputs.matrix).libtorrent-version[0] != null }}
    strategy:
      matrix: ${{ fromJson(needs.check-versions.outputs.matrix) }}
      fail-fast: false
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: libtorrent-packages-${{ matrix.libtorrent-version }}
          path: ./packages
      
      - name: List packages
        run: |
          ls -la ./packages
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ matrix.libtorrent-version }}
          name: Release v${{ matrix.libtorrent-version }}
          files: ./packages/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
